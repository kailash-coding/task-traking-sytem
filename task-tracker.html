<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Task Tracker</title>
    <link rel="stylesheet" href="task-tracker.css" />
  </head>
  <body>
    <main class="container">
      <h1>Simple Task Tracker</h1>

      <form id="task-form" class="task-form">
        <input id="task-input" placeholder="What needs to be done?" required />
        <button type="submit">Add</button>
      </form>

      <div class="controls">
        <label>
          Filter:
          <select id="filter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
          </select>
        </label>
        <button id="clear-completed">Clear completed</button>
      </div>

      <ul id="task-list" class="task-list" aria-live="polite"></ul>
    </main>

    <script src="task-tracker.js" defer></script>
  </body>
</html>
