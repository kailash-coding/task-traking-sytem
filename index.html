<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker</title>
  <link rel="stylesheet" href="task-tracker.css">
</head>
<body>
<main id="app">

  <header class="app-header">
    
    <div class="top-bar">
      <button id="historyBtn" class="icon-button" type="button">☰</button>
      <div id="monthLabel" class="month-label"></div>
      <button id="todayBtn" class="icon-button" type="button">•</button>
    </div>
    <div id="balanceRow" class="balance-row">
      <div>
        <div class="balance-title">BALANCE</div>
        <div id="balanceLabel" class="balance-label">₹0</div>
      </div>
      <button id="addBalanceBtn" class="action-button" type="button">Add balance</button>
    </div>
    <div id="lowBalanceBanner" class="low-balance-banner">
      Low balance: your balance is below ₹200
    </div>
    <div id="balanceEditRow" class="balance-edit-row">
      <div class="balance-type-buttons">
        <button id="typeAddBtn" class="balance-type-button" type="button">+ Add</button>
        <button id="typeLessBtn" class="balance-type-button" type="button">− Less</button>
      </div>
      <input id="balanceInput" class="balance-input" type="number" placeholder="Amount">
      <input id="balanceNoteInput" class="balance-input" type="text" placeholder="Note (e.g. salary, groceries)">
      <div class="balance-actions">
        <button id="balanceSaveBtn" class="save-button" type="button">Save</button>
        <button id="balanceCancelBtn" class="cancel-button" type="button">Cancel</button>
      </div>
    </div>
    <div class="week-navigation">
      <button id="prevDay" class="day-navigation-button" type="button">‹</button>
      <div id="weekStrip" class="week-strip"></div>
      <button id="nextDay" class="day-navigation-button" type="button">›</button>
    </div>
  </header>

  <section class="app-content">

    <div id="dayView">
      <div class="day-heading">
        <div id="dateLabel" class="date-label"></div>
        <div id="stats" class="stats-label"></div>
      </div>

      <div class="task-input-row">
        <input id="taskInput" type="text" placeholder="Add a task...">
        <div class="amount-input-wrapper">
          <span class="currency-symbol">₹</span>
          <input id="amountInput" type="number" placeholder="0">
        </div>
        <input id="taskImage" type="file" accept="image/*" hidden>
        <button id="taskImageBtn" class="image-button" type="button" title="Add image">📷</button>
      </div>

      <ul id="taskList" class="task-list"></ul>
      <div id="emptyMsg" class="empty-message">No tasks for this day yet.</div>
    </div>

    <div id="historyView" class="history-view">
      <div class="history-heading">
        <div class="history-title">Last 3 months</div>
        <button id="downloadPdfBtn" class="download-button" type="button">Download PDF</button>
      </div>
      <div id="historyTotal" class="history-total"></div>
      <div id="historyList"></div>

      <div class="balance-activity-title">Balance activity</div>
      <div id="txnList"></div>
    </div>

    <button id="addBtn" class="add-task-button" type="button">+</button>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="utils.js"></script>
<script src="task-tracker.js" defer></script>
</body>
</html>
